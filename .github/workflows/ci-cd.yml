# ---------------------------------------------------------------------------
# .github/workflows/ci-cd.yml
#
# CI/CD Pipeline for EKS GitOps Platform.
#
# Flow:
#   1. Test & Lint      — verify code quality
#   2. Build & Push ECR — build Docker image and push to ECR
#   3. Update Helm tag  — update image.tag in values.yaml and commit
#   4. ArgoCD detects   — ArgoCD detects commit and deploys automatically
#
# AWS Authentication via OIDC (no static keys):
#   - GitHub Actions assumes an IAM role via OIDC
#   - Role ARN comes from terraform output: github_actions_role_arn
#   - Zero long-term credentials stored in GitHub Secrets
# ---------------------------------------------------------------------------

name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "helm-charts/**"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

permissions:
  id-token: write   # Required for OIDC with AWS
  contents: write   # Required to commit updated image.tag

env:
  AWS_REGION: us-east-1
  ECR_API_REPO: ${{ secrets.ECR_API_REPO }}
  ECR_WORKER_REPO: ${{ secrets.ECR_WORKER_REPO }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Test & Lint
  # Runs on PRs and pushes. Blocks deployment if it fails.
  # ---------------------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/api-service/requirements.txt
            app/worker-service/requirements.txt

      - name: Install dependencies — api-service
        run: pip install -r app/api-service/requirements.txt

      - name: Install dependencies — worker-service
        run: pip install -r app/worker-service/requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check app/api-service/main.py app/worker-service/main.py

      - name: Type check with mypy
        run: |
          pip install mypy boto3-stubs[sqs,dynamodb,cloudwatch]
          mypy app/api-service/main.py --ignore-missing-imports
          mypy app/worker-service/main.py --ignore-missing-imports

      - name: Lint Helm charts
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint helm-charts/api-service
          helm lint helm-charts/worker-service

  # ---------------------------------------------------------------------------
  # JOB 2: Build & Push ECR + Update Helm Tag
  # Runs only on push to main (not on PRs).
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build, Push & Update Tag
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        service:
          - name: api-service
            context: app/api-service
            ecr_repo_secret: ECR_API_REPO
            helm_values: helm-charts/api-service/values.yaml
          - name: worker-service
            context: app/worker-service
            ecr_repo_secret: ECR_WORKER_REPO
            helm_values: helm-charts/worker-service/values.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # OIDC — assume IAM role without static keys
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ matrix.service.name }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Uses short commit SHA as tag — immutable and traceable
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ secrets[matrix.service.ecr_repo_secret] }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            --tag ${{ secrets[matrix.service.ecr_repo_secret] }}:latest \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "service=${{ matrix.service.name }}" \
            ${{ matrix.service.context }}

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets[matrix.service.ecr_repo_secret] }}:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL
        continue-on-error: false

      - name: Push to ECR
        run: |
          docker push ${{ secrets[matrix.service.ecr_repo_secret] }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ secrets[matrix.service.ecr_repo_secret] }}:latest

      # Update image.tag in values.yaml and commit
      # ArgoCD detects commit and deploys automatically
      - name: Update Helm values image tag
        run: |
          sed -i "s|tag: .*|tag: \"${{ steps.tag.outputs.IMAGE_TAG }}\"|" \
            ${{ matrix.service.helm_values }}

      - name: Commit updated Helm tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(deploy): update ${{ matrix.service.name }} image to ${{ steps.tag.outputs.IMAGE_TAG }} [skip ci]"
          file_pattern: ${{ matrix.service.helm_values }}
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  # ---------------------------------------------------------------------------
  # JOB 3: Notify deployment result
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment summary
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "✅ Deploy pipeline succeeded — ArgoCD will sync within 3 minutes"
          else
            echo "❌ Deploy pipeline failed — check logs above"
            exit 1
          fi
