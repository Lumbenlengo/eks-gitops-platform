# ---------------------------------------------------------------------------
# .github/workflows/terraform.yml
#
# Infrastructure pipeline — Terraform plan on PR, apply on merge to main.
#
# Auth: OIDC — no static AWS access keys stored in GitHub Secrets.
# The GitHub OIDC provider is registered in the AWS account, and a dedicated
# IAM role is assumed with a trust policy that restricts access to this
# specific repository and branch.
#
# PR flow:   plan → post plan output as PR comment → wait for human review
# Main flow: plan → apply (auto-approved after code review on PR)
# ---------------------------------------------------------------------------

name: Terraform — Plan & Apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

concurrency:
  # Only one Terraform run at a time — prevents state corruption
  group: terraform-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a running apply

env:
  AWS_REGION:     us-east-1
  AWS_ACCOUNT_ID: "962765734677"
  TF_VERSION:     "1.7.5"
  TF_WORKING_DIR: terraform
  # Terraform will not prompt for input — fail instead
  TF_INPUT:       "false"
  TF_IN_AUTOMATION: "true"

permissions:
  id-token:      write   # OIDC token exchange
  contents:      read    # Checkout repo
  pull-requests: write   # Post plan output as PR comment

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Terraform validate and format check (runs on every PR and push)
  # ---------------------------------------------------------------------------
  validate:
    name: Validate & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true  # Report but don't block — handled in PR comment

      - name: Terraform Init (for validation)
        run: |
          terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Run tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: tflint init and run
        run: |
          tflint --init
          tflint --recursive --no-color
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail: true   # Report security findings but don't block
          output_format: cli
          skip_check: >-
            CKV_AWS_144,
            CKV_AWS_18

  # ---------------------------------------------------------------------------
  # Job 2: Terraform plan (runs on PRs and pushes to main)
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-tf-plan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true  # Enables output capture for plan comment

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -reconfigure \
            -backend-config="region=${AWS_REGION}"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -detailed-exitcode \
            -out=tfplan \
            -var="aws_region=${AWS_REGION}"
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true  # exitcode=2 means changes present (not an error)

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1  # Plans are short-lived — apply must happen same run

      - name: Post plan to PR as comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## Terraform Plan 🔍

            #### Format: \`${{ steps.fmt.outcome }}\`
            #### Validate: \`${{ steps.validate.outcome }}\`
            #### Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*
            *Workflow: \`${{ github.workflow }}\` · Run: \`${{ github.run_id }}\`*

            ⚠️ **Review carefully before merging.** Apply runs automatically on merge to main.`;

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('## Terraform Plan')
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output,
              });
            }

      - name: Fail if plan errored (exitcode=1)
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Job 3: Terraform apply (runs only on push to main, after plan succeeds)
  # The plan was reviewed and approved via the PR process. Applying here is
  # safe because no code reaches main without a PR and code review.
  # ---------------------------------------------------------------------------
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.plan.outputs.exitcode == '2'
    environment:
      name: production
      url: https://patriciolumbe.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-tf-apply-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -reconfigure \
            -backend-config="region=${AWS_REGION}"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        id: apply
        run: |
          terraform apply \
            -no-color \
            -auto-approve \
            tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Extract Terraform outputs
        id: outputs
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecr_api_url=$(terraform output -raw ecr_api_service_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_worker_url=$(terraform output -raw ecr_worker_service_url)" >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Post apply summary
        run: |
          echo "## ✅ Terraform Apply Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster | \`${{ steps.outputs.outputs.cluster_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECR API | \`${{ steps.outputs.outputs.ecr_api_url }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECR Worker | \`${{ steps.outputs.outputs.ecr_worker_url }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next step: ArgoCD will sync app deployments automatically." >> "$GITHUB_STEP_SUMMARY"
