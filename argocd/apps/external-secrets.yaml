---
# ClusterSecretStore — tells External Secrets Operator where to find secrets
# (AWS Secrets Manager in us-east-1, authenticated via IRSA)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# ExternalSecret for api-service
# Syncs AWS Secrets Manager → Kubernetes Secret in api-service namespace
# Refresh every 1 hour — new secret versions propagate automatically
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-service-secrets
  namespace: api-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: api-service-secrets        # Name of the Kubernetes Secret created
    creationPolicy: Owner            # ESO owns the secret lifecycle
    deletionPolicy: Retain           # Don't delete the K8s secret if ESO uninstalls
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: DATABASE_PASSWORD   # Key in the Kubernetes Secret
      remoteRef:
        key: eks-gitops-platform/api-service/database  # Path in Secrets Manager
        property: password           # JSON key in the secret value
    - secretKey: API_SECRET_KEY
      remoteRef:
        key: eks-gitops-platform/api-service/app
        property: secret_key
---
# ExternalSecret for worker-service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: worker-service-secrets
  namespace: worker-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: worker-service-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: WORKER_SECRET
      remoteRef:
        key: eks-gitops-platform/worker-service/app
        property: worker_secret
